openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: TradeFlow API — trades business management
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: customers
    description: Customer/contact management
  - name: jobs
    description: Job management
  - name: quotes
    description: Quote management
  - name: invoices
    description: Invoice management
  - name: schedule
    description: Scheduling and appointments
  - name: dashboard
    description: Dashboard summaries

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── DASHBOARD ────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Dashboard KPI summary
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/activity:
    get:
      operationId: getDashboardActivity
      tags: [dashboard]
      summary: Recent activity feed
      responses:
        "200":
          description: Activity items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # ─── CUSTOMERS ────────────────────────────────────────────────
  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List customers
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── JOBS ─────────────────────────────────────────────────────
  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List jobs
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, in_progress, completed, invoiced, cancelled]
        - name: customerId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Create a job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Not found
    patch:
      operationId: updateJob
      tags: [jobs]
      summary: Update a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    delete:
      operationId: deleteJob
      tags: [jobs]
      summary: Delete a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── QUOTES ───────────────────────────────────────────────────
  /quotes:
    get:
      operationId: listQuotes
      tags: [quotes]
      summary: List quotes
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, sent, accepted, declined, expired]
        - name: customerId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of quotes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quote"
    post:
      operationId: createQuote
      tags: [quotes]
      summary: Create a quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"

  /quotes/{id}:
    get:
      operationId: getQuote
      tags: [quotes]
      summary: Get a quote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "404":
          description: Not found
    patch:
      operationId: updateQuote
      tags: [quotes]
      summary: Update a quote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
    delete:
      operationId: deleteQuote
      tags: [quotes]
      summary: Delete a quote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /quotes/{id}/send:
    post:
      operationId: sendQuote
      tags: [quotes]
      summary: Mark quote as sent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"

  /quotes/{id}/accept:
    post:
      operationId: acceptQuote
      tags: [quotes]
      summary: Mark quote as accepted
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"

  /quotes/{id}/decline:
    post:
      operationId: declineQuote
      tags: [quotes]
      summary: Mark quote as declined
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"

  /quotes/{id}/convert:
    post:
      operationId: convertQuoteToInvoice
      tags: [quotes]
      summary: Convert accepted quote to invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  # ─── INVOICES ─────────────────────────────────────────────────
  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List invoices
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, sent, paid, overdue, cancelled]
        - name: customerId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Create an invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "404":
          description: Not found
    patch:
      operationId: updateInvoice
      tags: [invoices]
      summary: Update an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
    delete:
      operationId: deleteInvoice
      tags: [invoices]
      summary: Delete an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /invoices/{id}/send:
    post:
      operationId: sendInvoice
      tags: [invoices]
      summary: Mark invoice as sent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}/pay:
    post:
      operationId: payInvoice
      tags: [invoices]
      summary: Mark invoice as paid
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  # ─── SCHEDULE ─────────────────────────────────────────────────
  /schedule:
    get:
      operationId: listAppointments
      tags: [schedule]
      summary: List appointments
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: jobId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
    post:
      operationId: createAppointment
      tags: [schedule]
      summary: Create an appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /schedule/{id}:
    get:
      operationId: getAppointment
      tags: [schedule]
      summary: Get an appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "404":
          description: Not found
    patch:
      operationId: updateAppointment
      tags: [schedule]
      summary: Update an appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
    delete:
      operationId: deleteAppointment
      tags: [schedule]
      summary: Delete an appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ─── DASHBOARD ──────────────────────────────────────────────
    DashboardSummary:
      type: object
      required:
        - activeJobs
        - pendingQuotes
        - unpaidInvoicesCount
        - unpaidInvoicesTotal
        - revenueThisMonth
        - revenueLastMonth
        - totalCustomers
        - jobsByStatus
      properties:
        activeJobs:
          type: integer
        pendingQuotes:
          type: integer
        unpaidInvoicesCount:
          type: integer
        unpaidInvoicesTotal:
          type: number
        revenueThisMonth:
          type: number
        revenueLastMonth:
          type: number
        totalCustomers:
          type: integer
        jobsByStatus:
          type: object
          properties:
            pending:
              type: integer
            in_progress:
              type: integer
            completed:
              type: integer
            invoiced:
              type: integer
            cancelled:
              type: integer

    ActivityItem:
      type: object
      required:
        - id
        - type
        - description
        - createdAt
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [job_created, job_updated, quote_sent, quote_accepted, invoice_sent, invoice_paid, customer_created]
        description:
          type: string
        entityId:
          type: ["integer", "null"]
        entityType:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    # ─── CUSTOMER ───────────────────────────────────────────────
    Customer:
      type: object
      required:
        - id
        - name
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        company:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        suburb:
          type: ["string", "null"]
        state:
          type: ["string", "null"]
        postcode:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CustomerInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
        phone:
          type: string
        company:
          type: string
        address:
          type: string
        suburb:
          type: string
        state:
          type: string
        postcode:
          type: string
        notes:
          type: string

    CustomerUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
        phone:
          type: string
        company:
          type: string
        address:
          type: string
        suburb:
          type: string
        state:
          type: string
        postcode:
          type: string
        notes:
          type: string

    # ─── LINE ITEM ───────────────────────────────────────────────
    LineItem:
      type: object
      required:
        - id
        - description
        - quantity
        - unitPrice
        - total
      properties:
        id:
          type: integer
        description:
          type: string
        quantity:
          type: number
        unitPrice:
          type: number
        total:
          type: number

    LineItemInput:
      type: object
      required:
        - description
        - quantity
        - unitPrice
      properties:
        description:
          type: string
        quantity:
          type: number
        unitPrice:
          type: number

    # ─── JOB ────────────────────────────────────────────────────
    Job:
      type: object
      required:
        - id
        - title
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, in_progress, completed, invoiced, cancelled]
        customerId:
          type: ["integer", "null"]
        customerName:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        scheduledDate:
          type: ["string", "null"]
          format: date
        completedDate:
          type: ["string", "null"]
          format: date
        notes:
          type: ["string", "null"]
        priority:
          type: string
          enum: [low, medium, high]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    JobInput:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        status:
          type: string
          enum: [pending, in_progress, completed, invoiced, cancelled]
        customerId:
          type: integer
        address:
          type: string
        scheduledDate:
          type: string
          format: date
        notes:
          type: string
        priority:
          type: string
          enum: [low, medium, high]

    JobUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        status:
          type: string
          enum: [pending, in_progress, completed, invoiced, cancelled]
        customerId:
          type: integer
        address:
          type: string
        scheduledDate:
          type: string
          format: date
        completedDate:
          type: string
          format: date
        notes:
          type: string
        priority:
          type: string
          enum: [low, medium, high]

    # ─── QUOTE ──────────────────────────────────────────────────
    Quote:
      type: object
      required:
        - id
        - quoteNumber
        - status
        - subtotal
        - tax
        - total
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        quoteNumber:
          type: string
        status:
          type: string
          enum: [draft, sent, accepted, declined, expired]
        customerId:
          type: ["integer", "null"]
        customerName:
          type: ["string", "null"]
        jobId:
          type: ["integer", "null"]
        title:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/LineItem"
        subtotal:
          type: number
        taxRate:
          type: number
        tax:
          type: number
        total:
          type: number
        validUntil:
          type: ["string", "null"]
          format: date
        sentAt:
          type: ["string", "null"]
          format: date-time
        acceptedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    QuoteInput:
      type: object
      properties:
        customerId:
          type: integer
        jobId:
          type: integer
        title:
          type: string
        notes:
          type: string
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/LineItemInput"
        taxRate:
          type: number
        validUntil:
          type: string
          format: date

    QuoteUpdate:
      type: object
      properties:
        customerId:
          type: integer
        jobId:
          type: integer
        title:
          type: string
        notes:
          type: string
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/LineItemInput"
        taxRate:
          type: number
        validUntil:
          type: string
          format: date

    # ─── INVOICE ────────────────────────────────────────────────
    Invoice:
      type: object
      required:
        - id
        - invoiceNumber
        - status
        - subtotal
        - tax
        - total
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        invoiceNumber:
          type: string
        status:
          type: string
          enum: [draft, sent, paid, overdue, cancelled]
        customerId:
          type: ["integer", "null"]
        customerName:
          type: ["string", "null"]
        jobId:
          type: ["integer", "null"]
        quoteId:
          type: ["integer", "null"]
        title:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/LineItem"
        subtotal:
          type: number
        taxRate:
          type: number
        tax:
          type: number
        total:
          type: number
        dueDate:
          type: ["string", "null"]
          format: date
        sentAt:
          type: ["string", "null"]
          format: date-time
        paidAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    InvoiceInput:
      type: object
      properties:
        customerId:
          type: integer
        jobId:
          type: integer
        quoteId:
          type: integer
        title:
          type: string
        notes:
          type: string
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/LineItemInput"
        taxRate:
          type: number
        dueDate:
          type: string
          format: date

    InvoiceUpdate:
      type: object
      properties:
        customerId:
          type: integer
        jobId:
          type: integer
        title:
          type: string
        notes:
          type: string
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/LineItemInput"
        taxRate:
          type: number
        dueDate:
          type: string
          format: date

    # ─── APPOINTMENT ────────────────────────────────────────────
    Appointment:
      type: object
      required:
        - id
        - title
        - startTime
        - endTime
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        jobId:
          type: ["integer", "null"]
        jobTitle:
          type: ["string", "null"]
        customerId:
          type: ["integer", "null"]
        customerName:
          type: ["string", "null"]
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        address:
          type: ["string", "null"]
        status:
