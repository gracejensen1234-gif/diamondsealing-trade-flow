components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ─── DASHBOARD ──────────────────────────────────────────────
    DashboardSummary:
      type: object
      required:
        - activeJobs
        - pendingQuotes
        - unpaidInvoicesCount
        - unpaidInvoicesTotal
        - revenueThisMonth
        - revenueLastMonth
        - totalCustomers
        - jobsByStatus
      properties:
        activeJobs:
          type: integer
        pendingQuotes:
          type: integer
        unpaidInvoicesCount:
          type: integer
        unpaidInvoicesTotal:
          type: number
        revenueThisMonth:
          type: number
        revenueLastMonth:
          type: number
        totalCustomers:
          type: integer
        jobsByStatus:
          type: object
          properties:
            pending:
              type: integer
            in_progress:
              type: integer
            completed:
              type: integer
            invoiced:
              type: integer
            cancelled:
              type: integer

    ActivityItem:
      type: object
      required: [id, type, description, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [job_created, job_updated, quote_sent, quote_accepted, invoice_sent, invoice_paid, customer_created, clocked_on, clocked_off, job_report_submitted]
        description:
          type: string
        entityId:
          type: ["integer", "null"]
        entityType:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    # ─── CUSTOMER ───────────────────────────────────────────────
    Customer:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        company:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        suburb:
          type: ["string", "null"]
        state:
          type: ["string", "null"]
        postcode:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CustomerInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
        phone:
          type: string
        company:
          type: string
        address:
          type: string
        suburb:
          type: string
        state:
          type: string
        postcode:
          type: string
        notes:
          type: string

    CustomerUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        company:
          type: string
        address:
          type: string
        suburb:
          type: string
        state:
          type: string
        postcode:
          type: string
        notes:
          type: string

    # ─── LINE ITEM ───────────────────────────────────────────────
    LineItem:
      type: object
      required: [id, description, quantity, unitPrice, total]
      properties:
        id:
          type: integer
        description:
          type: string
        quantity:
          type: number
        unitPrice:
          type: number
        total:
          type: number

    LineItemInput:
      type: object
      required: [description, quantity, unitPrice]
      properties:
        description:
          type: string
        quantity:
          type: number
        unitPrice:
          type: number

    # ─── JOB ────────────────────────────────────────────────────
    Job:
      type: object
      required: [id, title, status, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, in_progress, completed, invoiced, cancelled]
        customerId:
          type: ["integer", "null"]
        customerName:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        builderContactName:
          type: ["string", "null"]
        builderContactPhone:
          type: ["string", "null"]
        requiredColours:
          type: array
          items:
            type: string
        scheduledDate:
