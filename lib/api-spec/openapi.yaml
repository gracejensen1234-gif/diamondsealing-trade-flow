openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: Diamond Sealing — subcontractor operations management
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: customers
  - name: jobs
  - name: quotes
  - name: invoices
  - name: schedule
  - name: dashboard
  - name: subcontractors
  - name: workSessions
  - name: gps
  - name: dispatch
  - name: jobReports
  - name: stockItems
  - name: xero
  - name: weeklyInvoices
  - name: admin

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── DASHBOARD ────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Dashboard KPI summary
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/activity:
    get:
      operationId: getDashboardActivity
      tags: [dashboard]
      summary: Recent activity feed
      responses:
        "200":
          description: Activity items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # ─── CUSTOMERS ────────────────────────────────────────────────
  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List customers
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
    patch:
      operationId: updateCustomer
      tags: [customers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── JOBS ─────────────────────────────────────────────────────
  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, in_progress, completed, invoiced, cancelled]
        - name: customerId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
    post:
      operationId: createJob
      tags: [jobs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Not found
    patch:
      operationId: updateJob
      tags: [jobs]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    delete:
      operationId: deleteJob
      tags: [jobs]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── QUOTES ───────────────────────────────────────────────────
  /quotes:
    get:
      operationId: listQuotes
      tags: [quotes]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, sent, accepted, declined, expired]
        - name: customerId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of quotes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quote"
    post:
      operationId: createQuote
      tags: [quotes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"

  /quotes/{id}:
    get:
      operationId: getQuote
      tags: [quotes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "404":
          description: Not found
    patch:
      operationId: updateQuote
      tags: [quotes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
    delete:
      operationId: deleteQuote
      tags: [quotes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /quotes/{id}/send:
    post:
      operationId: sendQuote
      tags: [quotes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"

  /quotes/{id}/accept:
    post:
      operationId: acceptQuote
      tags: [quotes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"

  /quotes/{id}/decline:
    post:
      operationId: declineQuote
      tags: [quotes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"

  /quotes/{id}/convert:
    post:
      operationId: convertQuoteToInvoice
      tags: [quotes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  # ─── INVOICES ─────────────────────────────────────────────────
  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, sent, paid, overdue, cancelled]
        - name: customerId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      tags: [invoices]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "404":
          description: Not found
    patch:
      operationId: updateInvoice
      tags: [invoices]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
    delete:
      operationId: deleteInvoice
      tags: [invoices]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /invoices/{id}/send:
    post:
      operationId: sendInvoice
      tags: [invoices]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}/pay:
    post:
      operationId: payInvoice
      tags: [invoices]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  # ─── SCHEDULE ─────────────────────────────────────────────────
  /schedule:
    get:
      operationId: listAppointments
      tags: [schedule]
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: jobId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
    post:
      operationId: createAppointment
      tags: [schedule]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /schedule/{id}:
    get:
      operationId: getAppointment
      tags: [schedule]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "404":
          description: Not found
    patch:
      operationId: updateAppointment
      tags: [schedule]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
    delete:
      operationId: deleteAppointment
      tags: [schedule]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── SUBCONTRACTORS ───────────────────────────────────────────
  /subcontractors:
    get:
      operationId: listSubcontractors
      tags: [subcontractors]
      summary: List subcontractors
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subcontractor"
    post:
      operationId: createSubcontractor
      tags: [subcontractors]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubcontractorInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subcontractor"

  /subcontractors/{id}:
    get:
      operationId: getSubcontractor
      tags: [subcontractors]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Subcontractor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subcontractor"
        "404":
          description: Not found
    patch:
      operationId: updateSubcontractor
      tags: [subcontractors]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubcontractorUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subcontractor"

  # ─── WORK SESSIONS ────────────────────────────────────────────
  /work-sessions/clock-on:
    post:
      operationId: clockOn
      tags: [workSessions]
      summary: Clock on to start the day
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClockOnInput"
      responses:
        "201":
          description: Session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkSession"

  /work-sessions/clock-off:
    post:
      operationId: clockOff
      tags: [workSessions]
      summary: Clock off to end the day
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClockOffInput"
      responses:
        "200":
          description: Session ended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkSession"

  /work-sessions/break-start:
    post:
      operationId: startBreak
      tags: [workSessions]
      summary: Start lunch/rest break
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BreakInput"
      responses:
        "200":
          description: Break started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkSession"

  /work-sessions/break-end:
    post:
      operationId: endBreak
      tags: [workSessions]
      summary: End lunch/rest break
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BreakInput"
      responses:
        "200":
          description: Break ended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkSession"

  /work-sessions/today:
    get:
      operationId: getTodaySession
      tags: [workSessions]
      summary: Get today's session for a subcontractor
      parameters:
        - name: subcontractorId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Today's session or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkSession"
        "404":
          description: No session today

  /work-sessions:
    get:
      operationId: listWorkSessions
      tags: [workSessions]
      summary: List work sessions (admin)
      parameters:
        - name: subcontractorId
          in: query
          schema:
            type: integer
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: weekStart
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkSession"

  /work-sessions/{id}:
    get:
      operationId: getWorkSession
      tags: [workSessions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session with GPS timeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkSessionDetail"
        "404":
          description: Not found
    patch:
      operationId: updateWorkSession
      tags: [workSessions]
      summary: Admin edit of session (correct hours)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkSessionUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkSession"

  # ─── GPS ──────────────────────────────────────────────────────
  /gps/location:
    post:
      operationId: pushGpsLocation
      tags: [gps]
      summary: Push a GPS location point
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GpsLocationInput"
      responses:
        "201":
          description: Location recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GpsLocation"

  # ─── DISPATCH ─────────────────────────────────────────────────
  /dispatch:
    get:
      operationId: listDispatch
      tags: [dispatch]
      summary: List dispatch days
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: subcontractorId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Job assignments for date/subcontractor
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobAssignment"
    post:
      operationId: createDispatch
      tags: [dispatch]
      summary: Create dispatch assignments for a day
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DispatchInput"
      responses:
        "201":
          description: Assignments created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobAssignment"

  /dispatch/{id}:
    patch:
      operationId: updateJobAssignment
      tags: [dispatch]
      summary: Update a job assignment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobAssignmentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobAssignment"
    delete:
      operationId: deleteJobAssignment
      tags: [dispatch]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dispatch/{id}/arrive:
    post:
      operationId: markArrived
      tags: [dispatch]
      summary: Subcontractor marks arrival at job site
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Arrival recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobAssignment"

  /dispatch/{id}/depart:
    post:
      operationId: markDeparted
      tags: [dispatch]
      summary: Subcontractor marks departure (job done or leaving)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Departure recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobAssignment"

  # ─── JOB REPORTS ──────────────────────────────────────────────
  /job-reports:
    get:
      operationId: listJobReports
      tags: [jobReports]
      summary: List job completion reports (admin)
      parameters:
        - name: jobId
          in: query
          schema:
            type: integer
        - name: subcontractorId
          in: query
          schema:
            type: integer
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: hasIssues
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobReport"
    post:
      operationId: createJobReport
      tags: [jobReports]
      summary: Submit job completion report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobReportInput"
      responses:
        "201":
          description: Report submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobReport"

  /job-reports/{id}:
    get:
      operationId: getJobReport
      tags: [jobReports]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Report detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobReport"
        "404":
          description: Not found

  # ─── STOCK ITEMS ──────────────────────────────────────────────
  /stock-items:
    get:
      operationId: listStockItems
      tags: [stockItems]
      summary: List stock items / silicone products
      responses:
        "200":
          description: Stock items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockItem"
    post:
      operationId: createStockItem
      tags: [stockItems]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockItem"

  /stock-items/{id}:
    patch:
      operationId: updateStockItem
      tags: [stockItems]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockItemUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockItem"
    delete:
      operationId: deleteStockItem
      tags: [stockItems]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── XERO ─────────────────────────────────────────────────────
  /xero/settings:
    get:
      operationId: getXeroSettings
      tags: [xero]
      summary: Get Xero integration settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/XeroSettings"
    patch:
      operationId: updateXeroSettings
      tags: [xero]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/XeroSettingsUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/XeroSettings"

  /xero/connect:
    post:
      operationId: connectXero
      tags: [xero]
      summary: Initiate Xero OAuth connection
      responses:
        "200":
          description: OAuth URL
          content:
            application/json:
              schema:
                type: object
                required: [authUrl]
                properties:
                  authUrl:
                    type: string

  /xero/disconnect:
    post:
      operationId: disconnectXero
      tags: [xero]
      summary: Disconnect Xero integration
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/XeroSettings"

  # ─── WEEKLY INVOICES ──────────────────────────────────────────
  /weekly-invoices:
    get:
      operationId: listWeeklyInvoices
      tags: [weeklyInvoices]
      summary: List weekly invoice drafts
      parameters:
        - name: subcontractorId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, submitted, paid]
      responses:
        "200":
          description: Weekly invoice drafts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeeklyInvoice"

  /weekly-invoices/generate:
    post:
      operationId: generateWeeklyInvoices
      tags: [weeklyInvoices]
      summary: Generate weekly invoice drafts for completed work
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateWeeklyInvoicesInput"
      responses:
        "201":
          description: Drafts generated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeeklyInvoice"

  /weekly-invoices/{id}:
    get:
      operationId: getWeeklyInvoice
      tags: [weeklyInvoices]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice draft detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyInvoice"
        "404":
          description: Not found
    patch:
      operationId: updateWeeklyInvoice
      tags: [weeklyInvoices]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeeklyInvoiceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyInvoice"

  /weekly-invoices/{id}/submit:
    post:
      operationId: submitWeeklyInvoice
      tags: [weeklyInvoices]
      summary: Mark as submitted to Xero
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyInvoice"

  # ─── ADMIN ────────────────────────────────────────────────────
  /admin/live:
    get:
      operationId: getAdminLive
      tags: [admin]
      summary: Live status of all subcontractors
      responses:
        "200":
          description: Live statuses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubcontractorLiveStatus"

  /admin/timesheets:
    get:
      operationId: getAdminTimesheets
      tags: [admin]
