      parameters:
        - name: weekStart
          in: query
          schema:
            type: string
            format: date
        - name: subcontractorId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Timesheet entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimesheetEntry"

