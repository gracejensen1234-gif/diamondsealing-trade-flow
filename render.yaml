services:
  - type: web
    name: diamond-sealing-operations
    runtime: node
    plan: free
    buildCommand: corepack enable && corepack prepare pnpm@10.34.1 --activate && pnpm install --no-frozen-lockfile && pnpm run build:deploy
    startCommand: pnpm run start:deploy
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /
      - key: NODE_VERSION
        value: 24
      - key: DATABASE_URL
        fromDatabase:
          name: diamond-sealing-db
          property: connectionString

databases:
  - name: diamond-sealing-db
    plan: free
